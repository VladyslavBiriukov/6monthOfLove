<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Love Story</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Great+Vibes&display=swap"
        rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: #f8d7da;
            font-family: 'Playfair Display', serif;
            color: #a8002a;
        }

        /* HERO */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            text-align: center;
        }

        .hero h1 {
            font-size: 90px;
            margin: 0;
            line-height: 0.95;
            letter-spacing: 2px;
            opacity: 0;
            transform: translateY(35px);
            animation: heroFadeUp 1.4s ease forwards;
        }

        .hero span {
            font-family: 'Great Vibes';
            font-size: 40px;
            transform: rotate(-10deg) translateY(20px);
            margin: 10px 0 0;
            display: inline-block;
            opacity: 0;
            animation: heroFadeSoft 1.4s ease forwards;
            animation-delay: 0.45s;
        }

        .hero p {
            margin-top: 10px;
            letter-spacing: 2px;
            opacity: 0;
            transform: translateY(25px);
            animation: heroFadeUp 1.4s ease forwards;
            animation-delay: 0.85s;
        }

        .timer {
            margin-top: 20px;
            font-size: 18px;
            opacity: 0;
            transform: translateY(25px);
            animation: heroFadeUp 1.4s ease forwards;
            animation-delay: 1.2s;
        }

        /* MUSIC */
        .music-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 46px;
            height: 46px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.88);
            color: #a8002a;
            cursor: pointer;
            backdrop-filter: blur(8px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.10);
            z-index: 900;
            transition: transform 0.25s ease, background 0.25s ease, opacity 0.25s ease;
        }

        .music-btn:hover {
            transform: scale(1.06);
            background: rgba(255, 255, 255, 1);
        }

        .music-btn.playing {
            background: #a8002a;
            color: white;
        }

        .music-btn.hidden {
            opacity: 0;
            pointer-events: none;
        }

        @keyframes heroFadeUp {
            from {
                opacity: 0;
                transform: translateY(35px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes heroFadeSoft {
            from {
                opacity: 0;
                transform: rotate(-10deg) translateY(20px) scale(0.96);
            }

            to {
                opacity: 1;
                transform: rotate(-10deg) translateY(0) scale(1);
            }
        }

        @keyframes heroFadeDown {
            from {
                opacity: 0;
                transform: translateY(-12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* SECTION */
        .section {
            padding: 100px 20px;
            text-align: center;
        }

        /* PAGED GALLERY */
        .gallery-wrap {
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-viewport {
            overflow: hidden;
            width: 100%;
        }

        .gallery-grid {
            display: flex;
            transition: transform 0.4s ease;
            width: 100%;
            will-change: transform;
        }

        .gallery-page {
            min-width: 100%;
            box-sizing: border-box;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 24px;
            align-items: start;
            justify-items: center;
            padding: 10px 6px;
        }

        .slide {
            width: 100%;
            display: flex;
            justify-content: center;
            min-width: 0;
        }

        .polaroid {
            position: relative;
            background: white;
            padding: 12px 12px 40px;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 320px;
            box-sizing: border-box;
        }

        .polaroid img,
        .polaroid video {
            width: 100%;
            height: 320px;
            object-fit: cover;
            cursor: pointer;
            border-radius: 6px;
            display: block;
        }

        .caption {
            margin-top: 10px;
            font-family: 'Great Vibes';
            font-size: 22px;
        }

        .gallery-nav {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 22px;
        }

        .gallery-btn {
            border: none;
            background: rgba(255, 255, 255, 0.88);
            color: #a8002a;
            padding: 10px 16px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 18px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .gallery-btn:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 1);
        }

        .gallery-btn:disabled {
            opacity: 0.45;
            cursor: default;
            transform: none;
        }

        /* DELETE BUTTON */
        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 34px;
            height: 34px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.88);
            color: #a8002a;
            font-size: 22px;
            cursor: pointer;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
            z-index: 5;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .delete-btn:hover {
            transform: scale(1.08);
            background: rgba(255, 255, 255, 1);
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            background: rgba(0, 0, 0, 0.9);
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 2000;
            justify-content: center;
            align-items: center;
            overflow: auto;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal img,
        .modal video {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
        }

        .close {
            position: absolute;
            right: 30px;
            top: 20px;
            font-size: 40px;
            color: white;
            cursor: pointer;
            z-index: 2100;
        }

        /* UPLOAD UI */
        .upload-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .upload-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            color: #a8002a;
            cursor: pointer;
            transition: 0.3s;
        }

        .upload-circle:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.5);
        }

        .upload-circle input {
            display: none;
        }

        #captionInput {
            width: 250px;
            padding: 12px 15px;
            border-radius: 20px;
            border: none;
            outline: none;
            text-align: center;
            background: rgba(255, 255, 255, 0.6);
            font-family: 'Playfair Display', serif;
            color: #a8002a;
            box-sizing: border-box;
        }

        .add-btn {
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
            background: #a8002a;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
        }

        .add-btn:hover {
            background: #7a001f;
        }

        .file-status {
            min-height: 20px;
            font-size: 14px;
            color: #a8002a;
            opacity: 0.8;
        }

        /* TOAST */
        .toast {
            position: fixed;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%) translateY(20px);
            background: rgba(255, 255, 255, 0.92);
            color: #a8002a;
            padding: 14px 22px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s ease, transform 0.35s ease;
            z-index: 2000;
            backdrop-filter: blur(10px);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* CONFIRM DELETE MODAL */
        .confirm-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 3000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .confirm-box {
            width: min(420px, 92%);
            background: rgba(255, 255, 255, 0.96);
            border-radius: 22px;
            padding: 28px 24px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.18);
        }

        .confirm-box h3 {
            margin: 0 0 10px;
            font-size: 28px;
            color: #a8002a;
        }

        .confirm-box p {
            margin: 0 0 22px;
            font-size: 16px;
            color: #a8002a;
            opacity: 0.9;
        }

        .confirm-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .confirm-btn,
        .cancel-btn {
            border: none;
            border-radius: 999px;
            padding: 10px 18px;
            cursor: pointer;
            font-family: inherit;
            font-size: 15px;
        }

        .cancel-btn {
            background: rgba(168, 0, 42, 0.08);
            color: #a8002a;
        }

        .confirm-btn {
            background: #a8002a;
            color: white;
        }

        /* UPLOAD OVERLAY */
        .upload-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.28);
            backdrop-filter: blur(8px);
            z-index: 3500;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .upload-box {
            background: rgba(255, 255, 255, 0.95);
            color: #a8002a;
            border-radius: 24px;
            padding: 28px 30px;
            min-width: 260px;
            text-align: center;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.14);
        }

        .upload-box p {
            margin: 14px 0 0;
            font-size: 17px;
        }

        .loader-ring {
            width: 34px;
            height: 34px;
            margin: 0 auto;
            border-radius: 50%;
            border: 3px solid rgba(168, 0, 42, 0.18);
            border-top-color: #a8002a;
            animation: spinLoader 0.9s linear infinite;
        }

        @keyframes spinLoader {
            to {
                transform: rotate(360deg);
            }
        }

        /* REMOVE ANIMATION */
        .fade-out-card {
            animation: fadeOutCard 0.45s ease forwards;
        }

        @keyframes fadeOutCard {
            from {
                opacity: 1;
                transform: scale(1);
            }

            to {
                opacity: 0;
                transform: scale(0.92);
            }
        }

        /* TABLET */
        @media (max-width: 900px) {
            .gallery-page {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 18px;
            }

            .polaroid img,
            .polaroid video {
                height: 260px;
            }
        }

        /* MOBILE */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 54px;
                text-align: center;
                line-height: 0.95;
            }

            .hero span {
                font-size: 30px;
            }

            .hero p {
                font-size: 14px;
                letter-spacing: 1.5px;
            }

            .timer {
                font-size: 15px;
                margin-top: 16px;
            }

            .music-btn {
                top: 16px;
                right: 16px;
                width: 42px;
                height: 42px;
            }

            .section {
                padding: 60px 10px;
            }

            .gallery-wrap {
                max-width: 100%;
            }

            .gallery-page {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 12px;
                padding: 6px 4px;
            }

            .polaroid {
                max-width: 100%;
                padding: 8px 8px 26px;
                border-radius: 8px;
            }

            .polaroid img,
            .polaroid video {
                height: 150px;
            }

            .caption {
                font-size: 18px;
                margin-top: 8px;
            }

            .gallery-nav {
                margin-top: 16px;
                gap: 10px;
            }

            .gallery-btn {
                padding: 10px 14px;
                font-size: 18px;
            }

            #captionInput {
                width: min(280px, 90vw);
            }

            .upload-circle {
                width: 72px;
                height: 72px;
                font-size: 36px;
            }

            .close {
                top: 14px;
                right: 18px;
                font-size: 34px;
            }

            .modal img,
            .modal video {
                max-width: 96%;
                max-height: 84%;
            }
        }
    </style>
</head>

<body>

    <!-- MUSIC -->
    <button class="music-btn" type="button" onclick="toggleMusic()">🎵</button>
    <audio id="music" loop>
        <source src="music/Giacomo Puccini (Gianni Schicchi) - O mio babbino caro.mp3" type="audio/mpeg">
    </audio>

    <!-- HERO -->
    <section class="hero">
        <h1>YOU<br>ME</h1>
        <span>and</span>
        <p>OUR LOVE STORY</p>
        <div class="timer" id="timer"></div>
    </section>

    <!-- PHOTO SLIDER -->
    <section class="section">
        <h2>Our Moments</h2>

        <div class="gallery-wrap">
            <div class="gallery-viewport">
                <div class="gallery-grid" id="photoSlider">

                    <!-- 🔥 ТВОИ ФОТО -->
                    <div class="slide">
                        <div class="polaroid"><img src="img/photo1.png" onclick="openModal(this.src)">
                            <div class="caption">Start</div>
                        </div>
                    </div>
                    <div class="slide">
                        <div class="polaroid"><img src="img/photo2.png" onclick="openModal(this.src)">
                            <div class="caption">Kotik</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="gallery-nav">
                <button class="gallery-btn" data-gallery="photo" onclick="movePage('photo', -1)">❮</button>
                <button class="gallery-btn" data-gallery="photo" onclick="movePage('photo', 1)">❯</button>
            </div>
        </div>
    </section>

    <!-- VIDEO SLIDER -->
    <section class="section">
        <h2>Our Videos</h2>

        <div class="gallery-wrap">
            <div class="gallery-viewport">
                <div class="gallery-grid" id="videoSlider">

                    <div class="slide">
                        <div class="polaroid">
                            <video controls muted playsinline onclick="openModal('video/video7.mp4', 'video/mp4')">
                                <source src="video/video1.mp4" type="video/mp4">
                            </video>
                            <div class="caption">Our Love</div>
                        </div>
                    </div>

                </div>
            </div>

            <div class="gallery-nav">
                <button class="gallery-btn" data-gallery="video" onclick="movePage('video', -1)">❮</button>
                <button class="gallery-btn" data-gallery="video" onclick="movePage('video', 1)">❯</button>
            </div>
        </div>
    </section>

    <!-- MODAL -->
    <div id="modal" class="modal" onclick="handleModalBackdropClick(event)">
        <span class="close" onclick="closeModal()">&times;</span>
        <img id="modal-img" style="display:none;">
        <video id="modal-video" controls style="display:none;"></video>
    </div>

    <section class="section">
        <h2>Add Your Memory</h2>

        <div class="upload-container">

            <label class="upload-circle">
                +
                <input type="file" id="fileInput" accept="image/*,video/*" onchange="handleFileSelect()">
            </label>

            <div id="fileStatus" class="file-status">No file selected</div>

            <input type="text" id="captionInput" placeholder="Write something beautiful..." oninput="normalizeCaptionInput()" />

            <button class="add-btn" onclick="addMedia()">Add Memory</button>

        </div>
    </section>

    <div id="uploadOverlay" class="upload-overlay">
        <div class="upload-box">
            <div class="loader-ring"></div>
            <p>Uploading your memory...</p>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <div id="confirmModal" class="confirm-modal">
        <div class="confirm-box">
            <h3>Delete memory?</h3>
            <p>Are you sure you want to delete this memory?</p>
            <div class="confirm-actions">
                <button class="cancel-btn" onclick="closeDeleteModal()">Cancel</button>
                <button class="confirm-btn" onclick="confirmDelete()">Delete</button>
            </div>
        </div>
    </div>
    <script>
        // TIMER
        const startDate = new Date("2025-09-25");

        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById("timer").innerText = `We are together ${days} days`;
        }

        updateTimer();
        setInterval(updateTimer, 1000);

        // GALLERY STATE
        const galleryState = {
            photo: 0,
            video: 0
        };

        let musicInitialized = false;
        let playing = false;

        function getItemsPerPage() {
            if (window.innerWidth <= 600) return 4;   // 2x2 on phone
            if (window.innerWidth <= 900) return 4;   // 2x2 on tablet
            return 6;                                 // 3x2 on desktop
        }

        function rebuildGalleryPages(type) {
            const sliderId = type === "photo" ? "photoSlider" : "videoSlider";
            const slider = document.getElementById(sliderId);
            if (!slider) return;

            const allSlides = Array.from(
                slider.querySelectorAll(":scope > .slide, :scope > .gallery-page > .slide")
            );

            slider.innerHTML = "";

            const itemsPerPage = getItemsPerPage();

            for (let i = 0; i < allSlides.length; i += itemsPerPage) {
                const page = document.createElement("div");
                page.className = "gallery-page";

                allSlides.slice(i, i + itemsPerPage).forEach(slide => {
                    page.appendChild(slide);
                });

                slider.appendChild(page);
            }

            const totalPages = slider.children.length;

            if (galleryState[type] >= totalPages) {
                galleryState[type] = Math.max(0, totalPages - 1);
            }

            slider.style.transform = `translateX(-${galleryState[type] * 100}%)`;
            updateGalleryButtons(type);
        }

        function rebuildAllGalleries() {
            rebuildGalleryPages("photo");
            rebuildGalleryPages("video");
        }

        function updateGalleryButtons(type) {
            const sliderId = type === "photo" ? "photoSlider" : "videoSlider";
            const slider = document.getElementById(sliderId);
            if (!slider) return;

            const totalPages = slider.children.length;
            const buttons = document.querySelectorAll(`[data-gallery="${type}"]`);

            buttons.forEach(button => {
                button.disabled = totalPages <= 1;
            });
        }

        function movePage(type, direction) {
            const sliderId = type === "photo" ? "photoSlider" : "videoSlider";
            const slider = document.getElementById(sliderId);
            if (!slider) return;

            const totalPages = slider.children.length;
            if (totalPages <= 1) return;

            galleryState[type] += direction;

            if (galleryState[type] < 0) galleryState[type] = totalPages - 1;
            if (galleryState[type] >= totalPages) galleryState[type] = 0;

            slider.style.transform = `translateX(-${galleryState[type] * 100}%)`;
            updateGalleryButtons(type);
        }

        window.rebuildGalleryPages = rebuildGalleryPages;
        window.movePage = movePage;

        // TOUCH / SWIPE
        function addSwipeSupport(type) {
            const viewport = document.querySelector(
                type === "photo"
                    ? "#photoSlider"
                    : "#videoSlider"
            )?.closest(".gallery-viewport");

            if (!viewport) return;

            let startX = 0;
            let startY = 0;
            let isTouching = false;

            viewport.addEventListener("touchstart", (e) => {
                const touch = e.changedTouches[0];
                startX = touch.clientX;
                startY = touch.clientY;
                isTouching = true;
            }, { passive: true });

            viewport.addEventListener("touchend", (e) => {
                if (!isTouching) return;
                const touch = e.changedTouches[0];
                const diffX = touch.clientX - startX;
                const diffY = touch.clientY - startY;

                isTouching = false;

                if (Math.abs(diffX) > 50 && Math.abs(diffX) > Math.abs(diffY)) {
                    if (diffX < 0) {
                        movePage(type, 1);
                    } else {
                        movePage(type, -1);
                    }
                }
            }, { passive: true });
        }

        // MODAL
        function openModal(src, type = "") {
            const modal = document.getElementById("modal");
            const img = document.getElementById("modal-img");
            const video = document.getElementById("modal-video");
            const musicBtn = document.querySelector(".music-btn");

            modal.style.display = "flex";
            musicBtn.classList.add("hidden");

            const isVideo =
                type.startsWith("video") ||
                /\.(mp4|mov|webm|ogg)$/i.test(src);

            if (isVideo) {
                img.style.display = "none";
                img.src = "";

                video.style.display = "block";
                video.src = src;
                video.autoplay = true;
                video.load();
                video.play().catch(() => { });
            } else {
                video.pause();
                video.src = "";
                video.style.display = "none";

                img.src = src;
                img.style.display = "block";
            }
        }

        function closeModal() {
            const modal = document.getElementById("modal");
            const video = document.getElementById("modal-video");
            const musicBtn = document.querySelector(".music-btn");

            modal.style.display = "none";
            video.pause();
            video.src = "";
            musicBtn.classList.remove("hidden");
        }

        function handleModalBackdropClick(event) {
            if (event.target.id === "modal") {
                closeModal();
            }
        }

        // MUSIC
        async function playMusic() {
            const music = document.getElementById("music");
            const button = document.querySelector(".music-btn");

            try {
                await music.play();
                playing = true;
                musicInitialized = true;
                button.classList.add("playing");
            } catch (error) {
                console.error("Music play error:", error);
            }
        }

        function pauseMusic() {
            const music = document.getElementById("music");
            const button = document.querySelector(".music-btn");

            music.pause();
            playing = false;
            button.classList.remove("playing");
        }

        async function toggleMusic() {
            if (playing) {
                pauseMusic();
            } else {
                await playMusic();
            }
        }

        // First interaction starts music
        // document.addEventListener("click", async function initMusicOnce(e) {
        //     if (!musicInitialized) {
        //         const clickedInsideButton = e.target.closest(".music-btn");
        //         if (!clickedInsideButton) {
        //             await playMusic();
        //         }
        //     }
        // }, { once: true });

        // TOAST
        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.classList.add("show");

            clearTimeout(window.toastTimeout);
            window.toastTimeout = setTimeout(() => {
                toast.classList.remove("show");
            }, 2500);
        }

        // UPLOAD OVERLAY
        function showUploadOverlay() {
            document.getElementById("uploadOverlay").style.display = "flex";
        }

        function hideUploadOverlay() {
            document.getElementById("uploadOverlay").style.display = "none";
        }

        // FILE SELECT
        function handleFileSelect() {
            const fileInput = document.getElementById("fileInput");
            const fileStatus = document.getElementById("fileStatus");
            const file = fileInput.files[0];

            fileStatus.textContent = file ? `Selected: ${file.name}` : "No file selected";
        }

        function normalizeCaptionInput() {
            const captionInput = document.getElementById("captionInput");
            captionInput.value = captionInput.value.replace(/\s+/g, " ").trimStart();
        }

        // Compress image helper
        async function compressImage(file) {
            return new Promise((resolve) => {
                const img = new Image();
                const reader = new FileReader();

                reader.onload = function (e) {
                    img.src = e.target.result;
                };

                img.onload = function () {
                    const canvas = document.createElement("canvas");
                    const ctx = canvas.getContext("2d");

                    const maxWidth = 1200;
                    const scale = Math.min(1, maxWidth / img.width);

                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;

                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                    canvas.toBlob(
                        (blob) => {
                            const compressedFile = new File([blob], file.name.replace(/\.[^/.]+$/, ".jpg"), {
                                type: "image/jpeg"
                            });
                            resolve(compressedFile);
                        },
                        "image/jpeg",
                        0.75
                    );
                };

                reader.readAsDataURL(file);
            });
        }

        // ADD MEDIA
        async function addMedia() {
            const fileInput = document.getElementById("fileInput");
            const captionText = document.getElementById("captionInput").value.trim();
            const fileStatus = document.getElementById("fileStatus");
            const file = fileInput.files[0];

            if (!file) {
                showToast("Choose a photo or video first");
                return;
            }

            try {
                showUploadOverlay();
                let fileToUpload = file;

                if (file.type.startsWith("image")) {
                    fileToUpload = await compressImage(file);
                }

                await window.uploadToFirebase(fileToUpload, captionText);
                hideUploadOverlay();

                fileInput.value = "";
                document.getElementById("captionInput").value = "";
                fileStatus.textContent = "No file selected";

                showToast("Memory added ❤️");
            } catch (error) {
                console.error(error);
                hideUploadOverlay();
                showToast("Upload error");
            }
        }

        // DELETE MODAL
        let pendingDelete = null;

        function openDeleteModal(docId, storagePath, slideElement) {
            pendingDelete = { docId, storagePath, slideElement };
            document.getElementById("confirmModal").style.display = "flex";
        }

        function closeDeleteModal() {
            pendingDelete = null;
            document.getElementById("confirmModal").style.display = "none";
        }

        async function confirmDelete() {
            if (!pendingDelete) return;

            try {
                await window.deleteMemory(
                    pendingDelete.docId,
                    pendingDelete.storagePath
                );

                const type = pendingDelete.slideElement.closest("#videoSlider")
                    ? "video"
                    : "photo";

                pendingDelete.slideElement.classList.add("fade-out-card");

                setTimeout(() => {
                    pendingDelete.slideElement.remove();
                    rebuildGalleryPages(type);
                    closeDeleteModal();
                    showToast("Memory deleted");
                }, 400);

            } catch (error) {
                console.error(error);
                closeDeleteModal();
                showToast("Could not delete memory");
            }
        }

        // INIT
        window.addEventListener("load", () => {
            rebuildAllGalleries();
            addSwipeSupport("photo");
            addSwipeSupport("video");
        });

        let resizeTimeout;
        window.addEventListener("resize", () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                rebuildAllGalleries();
            }, 150);
        });
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import {
            getStorage,
            ref,
            uploadBytes,
            getDownloadURL,
            deleteObject
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
        import {
            getFirestore,
            addDoc,
            collection,
            getDocs,
            query,
            orderBy,
            deleteDoc,
            doc
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAG6D1m6dLRmZ64pFrkolm5_EEltnaa9TE",
            authDomain: "ourlove-4620d.firebaseapp.com",
            projectId: "ourlove-4620d",
            storageBucket: "ourlove-4620d.firebasestorage.app",
            messagingSenderId: "19922774823",
            appId: "1:19922774823:web:eeb33d3befb4547ac81702"
        };

        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);
        const db = getFirestore(app);

        function isVideoType(type) {
            return type && type.startsWith("video");
        }

        function createMemorySlide(data) {
            const isVideo = isVideoType(data.type);

            const slide = document.createElement("div");
            slide.className = "slide";

            const polaroid = document.createElement("div");
            polaroid.className = "polaroid";

            let media;

            if (isVideo) {
                media = document.createElement("video");
                media.controls = true;
                media.muted = true;
                media.playsInline = true;
                media.innerHTML = `<source src="${data.url}" type="${data.type}">`;
                media.onclick = () => window.openModal(data.url, data.type);
                media.onerror = () => slide.remove();
            } else {
                media = document.createElement("img");
                media.src = data.url;
                media.onclick = () => window.openModal(data.url, data.type || "");
                media.onerror = () => slide.remove();
            }

            const caption = document.createElement("div");
            caption.className = "caption";
            caption.innerText = data.caption || "";

            if (data.docId && data.storagePath) {
                const deleteBtn = document.createElement("button");
                deleteBtn.className = "delete-btn";
                deleteBtn.innerHTML = "&times;";
                deleteBtn.onclick = (e) => {
                    e.stopPropagation();
                    window.openDeleteModal(data.docId, data.storagePath, slide);
                };
                polaroid.appendChild(deleteBtn);
            }

            polaroid.appendChild(media);
            polaroid.appendChild(caption);
            slide.appendChild(polaroid);

            if (isVideo) {
                document.getElementById("videoSlider").appendChild(slide);
            } else {
                document.getElementById("photoSlider").appendChild(slide);
            }
        }

        async function loadMemories() {
            try {
                const memoriesRef = collection(db, "memories");
                const memoriesQuery = query(memoriesRef, orderBy("createdAt", "asc"));
                const querySnapshot = await getDocs(memoriesQuery);

                querySnapshot.forEach((docSnap) => {
                    createMemorySlide({
                        docId: docSnap.id,
                        ...docSnap.data()
                    });
                });

                if (window.rebuildGalleryPages) {
                    window.rebuildGalleryPages("photo");
                    window.rebuildGalleryPages("video");
                }
            } catch (error) {
                console.error("Load memories error:", error);
            }
        }

        window.uploadToFirebase = async function (file, caption) {
            const filePath = `memories/${Date.now()}_${file.name}`;
            const storageRef = ref(storage, filePath);

            await uploadBytes(storageRef, file);
            const url = await getDownloadURL(storageRef);

            const memoryData = {
                url: url,
                caption: caption,
                type: file.type,
                createdAt: Date.now(),
                storagePath: filePath
            };

            const docRef = await addDoc(collection(db, "memories"), memoryData);

            createMemorySlide({
                docId: docRef.id,
                ...memoryData
            });

            if (window.rebuildGalleryPages) {
                window.rebuildGalleryPages(isVideoType(file.type) ? "video" : "photo");
            }
        };

        window.deleteMemory = async function (docId, storagePath) {
            await deleteDoc(doc(db, "memories", docId));
            await deleteObject(ref(storage, storagePath));
        };

        loadMemories();
    </script>
